<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/jeu-detail.css">
    <title>Game Store - Detail du jeu</title>
</head>

<body>
    <header>
        <a class="brand-mark" href="index.html">Game Store</a>
        <div class="header-actions">
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="about.html">A propos</a></li>
                    <li><a href="avis.html">Avis</a></li>
                    <li><a href="jeu.html" class="active">Les jeux</a></li>
                    <li><a href="profile.html">Profile</a></li>
                </ul>
            </nav>
            <form id="search-form" class="search-form" action="javascript:void(0);">
                <input class="search-input" type="text" id="search-bar" placeholder="Rechercher un jeu...">
            </form>
        </div>
    </header>

    <main>
        <a class="back-link" href="jeu.html">← Retour a la liste des jeux</a>

        <section class="detail-card" id="detail-card" aria-live="polite">
            <div class="media-wrap">
                <img id="game-image" src="" alt="" />
            </div>

            <div class="content-wrap">
                <p class="meta" id="game-meta"></p>
                <h1 id="game-title"></h1>
                <p class="long-desc" id="game-desc"></p>

                <div class="actions">
                    <a id="download-link" class="btn-download" href="#" target="_blank" rel="noopener noreferrer">Telecharger</a>
                    <a class="btn-secondary" href="login.html">Acheter</a>
                </div>
            </div>
        </section>

        <section class="game-trailer">
            <h2>Bande-annonce</h2>
            <div class="trailer-video">
                <!-- Example YouTube embed, replace VIDEO_ID as needed -->
                <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>
    </main>

    <footer class="footer-note">
        © Tout droit réservé à Thierry Tavares, Dan Zorev et Jason Haran.
    </footer>

    
    <script src="js/games.js"></script>
    <script src="js/game-detail.js"></script>
    <script src="js/search.js"></script>
</body>

</html>
