        downloadLink.href = game.downloadUrl;

        // Update trailer section dynamically
        function updateTrailer(game) {
            const trailerSection = document.querySelector('.trailer-video');
            if (game.trailer) {
                const url = game.trailer;
                const embedUrl = toEmbedUrl(url);
                trailerSection.innerHTML = `<iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe>`;
            } else {
                trailerSection.innerHTML = '<p>Aucune bande-annonce disponible.</p>';
            }
        }

        updateTrailer(game);

        function toEmbedUrl(url) {
            if (!url) return '';
            if (url.includes('youtube.com/watch?v=')) {
                const id = new URL(url).searchParams.get('v');
                return `https://www.youtube.com/embed/${id}`;
            }
            if (url.includes('youtu.be/')) {
                const id = url.split('youtu.be/')[1].split('?')[0];
                return `https://www.youtube.com/embed/${id}`;
            }
            return url;
        }

                );
                if (results.length > 0) {

                    window.location.href = 'jeu-detail.html?id=' + slug;
