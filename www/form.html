<body>
    <main>
        <div class="form-page">
            <section class="form-card">
                <h2 class="form-title">Créer un compte</h2>
                <form class="signup-form" action="register.php" method="POST" autocomplete="off">
                    <label for="username">Nom d'utilisateur</label>
                    <input class="text-input" type="text" id="username" name="username" required>

                    <label for="email">Adresse email</label>
                    <input class="text-input" type="email" id="email" name="email" required>

                    <label for="password">Mot de passe</label>
                    <input class="text-input" type="password" id="password" name="password" required>

                    <label for="creditcard">Carte bancaire</label>
                    <input class="text-input" type="text" id="creditcard" name="creditcard" pattern="[0-9]{16}" maxlength="16" placeholder="1234 5678 9012 3456" required>

                    <button class="primary-button" type="submit">Créer un compte</button>
                </form>
                <div class="divider">ou</div>
