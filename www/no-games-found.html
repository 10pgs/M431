<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aucun jeu trouvé - Game Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: linear-gradient(180deg, #f6f7f9 0%, #eceff2 100%);
            --panel: rgba(255, 255, 255, 0.9);
            --border: rgba(15, 23, 42, 0.1);
            --shadow: 0 18px 38px rgba(15, 23, 42, 0.12);
            --text: #0f172a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background:
                radial-gradient(circle at 12% 15%, rgba(255, 122, 24, 0.14), transparent 30%),
                radial-gradient(circle at 85% 2%, rgba(37, 99, 235, 0.12), transparent 28%),
                var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 36px 34px;
            text-align: center;
            max-width: 520px;
            width: 100%;
        }
        h1 {
            font-family: 'Sora', 'Space Grotesk', sans-serif;
            font-size: clamp(1.8rem, 2.4vw, 2.4rem);
            margin: 0 0 12px;
        }
        p {
            margin: 0 0 24px;
            color: #475569;
            line-height: 1.6;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a.button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            border: 1px solid #d0d7e2;
            color: #0f172a;
            background: #fff;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }
        a.button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
        }
        .primary {
            color: #fff;
            background: linear-gradient(135deg, #0f4fbf, #2563eb);
            border: none;
            box-shadow: 0 12px 22px rgba(37, 99, 235, 0.28);
        }
    </style>
</head>
<body>
    <div class="panel" role="alert">
        <h1>Aucun jeu trouvé</h1>
        <p>Aucun résultat ne correspond à ta recherche. Vérifie l'orthographe ou explore la liste complète des jeux.</p>
        <div class="actions">
            <a class="button primary" href="games.html">Voir tous les jeux</a>
            <a class="button" href="./index.html">Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>
